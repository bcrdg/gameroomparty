<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter Bonus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;
    font-family:'Orbitron',monospace;touch-action:none;-webkit-user-select:none;user-select:none}
  canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 800, H = 600, S = 1;
var BASE_W = 420;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  S = W / BASE_W;
  buildStars();
}

// ═══ COLORS ═══
var NC='#00ffff', NP='#ff2d95', NY='#fcee09', NV='#b537f2', GD='#ffd700';

// ═══ STATE ═══
var state = 'ready';
var game = null;
var keys = {};
var touchX = 0, touchActive = false;
var tiltX = 0;
var score = 0;

// Stars
var stars = [];
function buildStars() {
  stars = [];
  for (var i = 0; i < 200; i++) {
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      z: Math.random(),
      speed: 2 + Math.random()*8
    });
  }
}

resize();
window.addEventListener('resize', resize);

// ═══ GAME OBJECT ═══
function initGame() {
  score = 0;
  game = {
    playerX: W/2,
    playerY: H*0.75,
    speed: 4*S,
    bullets: [],
    enemies: [],
    explosions: [],
    powerups: [],
    timer: 45*60, // 45 seconds
    spawnCounter: 0,
    health: 3,
    maxHealth: 3,
    weapon: 'normal', // normal, spread, rapid
    weaponTimer: 0,
    boss: null,
    bossSpawned: false
  };
}

// ═══ INPUT ═══
document.addEventListener('keydown',function(e){
  keys[e.key]=true;
  if(state==='ready'&&(e.key===' '||e.key==='s'||e.key==='S')){state='playing';initGame();}
  if(state==='done'&&(e.key===' '||e.key==='s'||e.key==='S')){state='ready';}
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(state==='ready'){state='playing';initGame();return;}
  if(state==='done'){state='ready';return;}
  touchActive = true;
  touchX = e.touches[0].clientX;
});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(touchActive) touchX = e.touches[0].clientX;
});
canvas.addEventListener('touchend',function(){touchActive=false;});

// Tilt controls
function handleTilt(e) {
  if (e.gamma !== null) {
    tiltX = Math.max(-1, Math.min(1, e.gamma / 30));
  }
}
function enableTilt() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(function(permissionState) {
        if (permissionState === 'granted') {
          window.addEventListener('deviceorientation', handleTilt);
        }
      });
  } else if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', handleTilt);
  }
}
document.addEventListener('touchstart', enableTilt, { once: true });
document.addEventListener('click', enableTilt, { once: true });

// ── XIN-MO GAMEPAD SUPPORT ──
const PAD_MAP = {0:'ArrowLeft', 1:'ArrowDown', 2:'ArrowUp', 3:'ArrowRight', 4:'s'};
const padPrev = {};
function pollGamepad() {
  var pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (var i=0; i<pads.length; i++) {
    var pad = pads[i];
    if (!pad) continue;
    for (var btnIdx in PAD_MAP) {
      var key = PAD_MAP[btnIdx];
      var cur = !!(pad.buttons[btnIdx] && pad.buttons[btnIdx].pressed);
      if (cur && !padPrev[btnIdx]) {
        keys[key] = true;
        if(state==='ready'&&key==='s'){state='playing';initGame();}
        if(state==='done'&&key==='s'){state='ready';}
      }
      else if (!cur && padPrev[btnIdx]) keys[key] = false;
      padPrev[btnIdx] = cur;
    }
    break;
  }
  requestAnimationFrame(pollGamepad);
}
requestAnimationFrame(pollGamepad);

// ═══ UPDATE ═══
function update() {
  if(state!=='playing'||!game) return;
  var g = game;

  g.timer--;
  if(g.timer<=0){endGame();return;}

  // Player movement (up/down/left/right)
  var mx = 0, my = 0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) mx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) mx=1;
  if(keys['ArrowDown']) my=1;
  if(keys['ArrowUp']&&!keys['s']&&!keys['S']&&!keys[' ']) my=-1; // Up moves unless firing
  if(touchActive) mx = (touchX - g.playerX) / (W/2);
  if(Math.abs(tiltX) > 0.1) mx = tiltX;

  g.playerX += mx * g.speed * 2;
  g.playerY += my * g.speed * 2;
  g.playerX = Math.max(50*S, Math.min(W-50*S, g.playerX));
  g.playerY = Math.max(50*S, Math.min(H-50*S, g.playerY));

  // Weapon timer
  if(g.weaponTimer > 0) {
    g.weaponTimer--;
    if(g.weaponTimer === 0) g.weapon = 'normal';
  }

  // Auto-fire (start button or space)
  if(keys['s']||keys['S']||keys[' ']) {
    if(g.bullets.length < 30) {
      if(g.weapon === 'spread') {
        // Spread shot
        for(var angle=-20; angle<=20; angle+=10) {
          var rad = angle * Math.PI/180;
          g.bullets.push({x:g.playerX, y:g.playerY-30*S, vx:Math.sin(rad)*8*S, vy:-Math.cos(rad)*8*S});
        }
      } else if(g.weapon === 'rapid') {
        // Rapid fire
        g.bullets.push({x:g.playerX-15*S, y:g.playerY-30*S, vx:0, vy:-10*S});
        g.bullets.push({x:g.playerX+15*S, y:g.playerY-30*S, vx:0, vy:-10*S});
      } else {
        // Normal
        g.bullets.push({x:g.playerX-15*S, y:g.playerY-30*S, vx:0, vy:-8*S});
        g.bullets.push({x:g.playerX+15*S, y:g.playerY-30*S, vx:0, vy:-8*S});
      }
    }
  }

  // Update bullets
  for(var i=0; i<g.bullets.length; i++) {
    g.bullets[i].x += g.bullets[i].vx;
    g.bullets[i].y += g.bullets[i].vy;
  }
  g.bullets = g.bullets.filter(function(b){return b.y > -20 && b.x > -20 && b.x < W+20;});

  // Spawn boss at 15 seconds remaining
  if(!g.bossSpawned && g.timer < 15*60) {
    g.bossSpawned = true;
    g.boss = {
      x: W/2,
      y: -100*S,
      vx: 2*S,
      vy: 1*S,
      health: 30,
      maxHealth: 30,
      shootTimer: 0
    };
  }

  // Spawn enemies (3 types)
  g.spawnCounter++;
  var spawnRate = g.boss ? 80 : 35; // Slower during boss
  if(g.spawnCounter > spawnRate && !g.boss) {
    g.spawnCounter = 0;
    var ex = 50*S + Math.random()*(W-100*S);
    var type = Math.floor(Math.random()*3);

    if(type === 0) {
      // Fast fighter
      g.enemies.push({type:'fighter', x:ex, y:-50*S, vx:0, vy:3*S+Math.random()*2*S, health:1});
    } else if(type === 1) {
      // Slow tank
      g.enemies.push({type:'tank', x:ex, y:-50*S, vx:0, vy:1.5*S, health:4});
    } else {
      // Weaving enemy
      g.enemies.push({type:'weaver', x:ex, y:-50*S, vx:2*S, vy:2*S, health:2, phase:0});
    }
  }

  // Update boss
  if(g.boss) {
    var b = g.boss;
    b.x += b.vx;
    b.y += b.vy;

    // Boss movement pattern
    if(b.y > H*0.2) b.vy = 0;
    if(b.x < 100*S || b.x > W-100*S) b.vx *= -1;

    // Boss shooting
    b.shootTimer++;
    if(b.shootTimer > 30) {
      b.shootTimer = 0;
      // Spawn enemy bullets
      var angle = Math.atan2(g.playerY - b.y, g.playerX - b.x);
      g.enemies.push({type:'bullet', x:b.x, y:b.y, vx:Math.cos(angle)*3*S, vy:Math.sin(angle)*3*S, health:1});
    }

    // Check bullet collision with boss
    for(var j=0; j<g.bullets.length; j++) {
      var bullet = g.bullets[j];
      if(Math.abs(bullet.x - b.x) < 40*S && Math.abs(bullet.y - b.y) < 40*S) {
        b.health--;
        g.bullets.splice(j, 1);
        g.explosions.push({x:bullet.x, y:bullet.y, life:10});
        if(b.health <= 0) {
          score += 1000;
          g.explosions.push({x:b.x, y:b.y, life:40});
          g.boss = null;
        }
        break;
      }
    }

    // Boss collision with player
    if(g.boss && Math.abs(b.x - g.playerX) < 50*S && Math.abs(b.y - g.playerY) < 50*S) {
      g.health = 0;
      endGame();
      return;
    }
  }

  // Update enemies
  for(var i=0; i<g.enemies.length; i++) {
    var e = g.enemies[i];

    // Enemy movement patterns
    if(e.type === 'weaver') {
      e.phase += 0.1;
      e.x += Math.sin(e.phase) * 2*S;
    }
    e.x += e.vx;
    e.y += e.vy;

    // Check bullet collision
    for(var j=0; j<g.bullets.length; j++) {
      var bullet = g.bullets[j];
      var hitDist = e.type === 'tank' ? 25*S : 20*S;
      if(Math.abs(bullet.x - e.x) < hitDist && Math.abs(bullet.y - e.y) < hitDist) {
        e.health--;
        g.bullets.splice(j, 1);
        if(e.health <= 0) {
          var points = e.type==='fighter' ? 100 : e.type==='tank' ? 200 : 150;
          score += points;
          g.explosions.push({x:e.x, y:e.y, life:20});

          // Drop powerup chance (20%)
          if(Math.random() < 0.2 && e.type !== 'bullet') {
            var pType = Math.random() < 0.33 ? 'spread' : Math.random() < 0.5 ? 'rapid' : 'health';
            g.powerups.push({x:e.x, y:e.y, type:pType, vy:2*S});
          }

          g.enemies.splice(i, 1);
          i--;
        }
        break;
      }
    }

    // Check player collision
    if(i>=0 && Math.abs(e.x - g.playerX) < 30*S && Math.abs(e.y - g.playerY) < 30*S) {
      g.health--;
      g.explosions.push({x:e.x, y:e.y, life:20});
      g.enemies.splice(i, 1);
      i--;
      if(g.health <= 0) {
        endGame();
        return;
      }
    }
  }
  g.enemies = g.enemies.filter(function(e){return e.y < H+50 && e.y > -100;});

  // Update powerups
  for(var i=0; i<g.powerups.length; i++) {
    var p = g.powerups[i];
    p.y += p.vy;

    // Check collection
    if(Math.abs(p.x - g.playerX) < 25*S && Math.abs(p.y - g.playerY) < 25*S) {
      if(p.type === 'health') {
        g.health = Math.min(g.maxHealth, g.health + 1);
      } else {
        g.weapon = p.type;
        g.weaponTimer = 300; // 5 seconds
      }
      g.powerups.splice(i, 1);
      i--;
    }
  }
  g.powerups = g.powerups.filter(function(p){return p.y < H+50;});

  // Update explosions
  for(var i=0; i<g.explosions.length; i++) {
    g.explosions[i].life--;
  }
  g.explosions = g.explosions.filter(function(ex){return ex.life > 0;});
}

function endGame() {
  state = 'done';
  window.parent.postMessage({type:'bonusComplete', score:score}, '*');
}

// ═══ RENDER ═══
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for(var i=0; i<stars.length; i++) {
    var st = stars[i];
    st.y += st.speed * st.z * S;
    if(st.y > H) {
      st.y = 0;
      st.x = Math.random()*W;
    }
    ctx.fillStyle = 'rgba(255,255,255,'+st.z+')';
    var sz = 1 + st.z*2;
    ctx.fillRect(st.x, st.y, sz, sz*3);
  }

  if(state==='ready') {
    ctx.textAlign='center';
    ctx.fillStyle=NC;
    ctx.font='bold '+(32*S)+'px Orbitron';
    ctx.fillText('SPACE SHOOTER BONUS',W/2,H*0.3);
    ctx.fillStyle='#fff';
    ctx.font=(20*S)+'px Orbitron';
    ctx.fillText('Move: Arrow Keys / Joystick',W/2,H*0.5);
    ctx.fillText('Fire: START / SPACE / UP',W/2,H*0.55);
    ctx.fillStyle=NY;
    ctx.font='bold '+(24*S)+'px Orbitron';
    ctx.fillText('PRESS START',W/2,H*0.7);
    return;
  }

  if(state==='done') {
    ctx.textAlign='center';
    ctx.fillStyle=NP;
    ctx.font='bold '+(36*S)+'px Orbitron';
    ctx.fillText('MISSION COMPLETE!',W/2,H*0.4);
    ctx.fillStyle=GD;
    ctx.font='bold '+(32*S)+'px Orbitron';
    ctx.fillText('SCORE: '+score,W/2,H*0.5);
    ctx.fillStyle='#aaa';
    ctx.font=(18*S)+'px Orbitron';
    ctx.fillText('Returning to main game...',W/2,H*0.6);
    return;
  }

  if(!game) return;
  var g = game;

  // Draw player ship (robot in spaceship)
  ctx.save();
  ctx.translate(g.playerX, g.playerY);
  ctx.scale(S, S);

  // Ship body
  ctx.fillStyle = '#22a844';
  ctx.beginPath();
  ctx.moveTo(0, -30);
  ctx.lineTo(-20, 10);
  ctx.lineTo(20, 10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#186830';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Cockpit (robot visible)
  ctx.fillStyle = '#7b3fa8';
  ctx.beginPath();
  ctx.arc(0, -10, 8, 0, 6.28);
  ctx.fill();
  ctx.fillStyle = '#3366ee';
  ctx.fillRect(-4, -15, 8, 6);

  // Wings
  ctx.fillStyle = '#3344dd';
  ctx.fillRect(-35, 0, 15, 4);
  ctx.fillRect(20, 0, 15, 4);

  // Engines
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(-15, 8, 6, 8);
  ctx.fillRect(9, 8, 6, 8);

  ctx.restore();

  // Draw bullets
  ctx.fillStyle = NC;
  ctx.shadowBlur = 10;
  ctx.shadowColor = NC;
  for(var i=0; i<g.bullets.length; i++) {
    var b = g.bullets[i];
    ctx.fillRect(b.x-2*S, b.y, 4*S, 12*S);
  }
  ctx.shadowBlur = 0;

  // Draw boss
  if(g.boss) {
    var b = g.boss;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(S, S);

    // Boss body
    ctx.fillStyle = '#550000';
    ctx.fillRect(-40, -30, 80, 60);
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 3;
    ctx.strokeRect(-40, -30, 80, 60);

    // Boss cannons
    ctx.fillStyle = '#aa0000';
    ctx.fillRect(-50, -10, 15, 8);
    ctx.fillRect(35, -10, 15, 8);

    // Boss core
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, 6.28);
    ctx.fill();

    ctx.restore();

    // Boss health bar
    var hpWidth = 200*S;
    var hpX = W/2 - hpWidth/2;
    var hpY = 20*S;
    ctx.fillStyle = '#330000';
    ctx.fillRect(hpX, hpY, hpWidth, 10*S);
    ctx.fillStyle = '#ff0000';
    var hpPct = b.health / b.maxHealth;
    ctx.fillRect(hpX, hpY, hpWidth * hpPct, 10*S);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(hpX, hpY, hpWidth, 10*S);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+(16*S)+'px Orbitron';
    ctx.fillText('BOSS', W/2, hpY - 5*S);
  }

  // Draw enemies (3 types)
  for(var i=0; i<g.enemies.length; i++) {
    var e = g.enemies[i];
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.scale(S, S);

    if(e.type === 'bullet') {
      // Enemy bullet
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, 6.28);
      ctx.fill();
    } else if(e.type === 'fighter') {
      // Fast fighter (small, red)
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.moveTo(0, 15);
      ctx.lineTo(-10, -8);
      ctx.lineTo(10, -8);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, 6.28);
      ctx.fill();
    } else if(e.type === 'tank') {
      // Tank (big, slow, tough)
      ctx.fillStyle = '#666666';
      ctx.fillRect(-15, -15, 30, 30);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(-15, -15, 30, 30);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-8, -8, 16, 16);
    } else if(e.type === 'weaver') {
      // Weaver (purple, moves side to side)
      ctx.fillStyle = '#9b3fd8';
      ctx.beginPath();
      ctx.moveTo(0, 18);
      ctx.lineTo(-12, -5);
      ctx.lineTo(-8, -10);
      ctx.lineTo(8, -10);
      ctx.lineTo(12, -5);
      ctx.closePath();
      ctx.fill();
      // Wings
      ctx.fillStyle = '#7b3fa8';
      ctx.fillRect(-20, 0, 10, 3);
      ctx.fillRect(10, 0, 10, 3);
    }

    ctx.restore();
  }

  // Draw powerups
  for(var i=0; i<g.powerups.length; i++) {
    var p = g.powerups[i];
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(Date.now()*0.005);
    ctx.scale(S, S);

    var color = p.type==='health' ? '#00ff00' : p.type==='spread' ? '#ffff00' : '#ff00ff';
    ctx.fillStyle = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(8, -4);
    ctx.lineTo(12, 0);
    ctx.lineTo(8, 4);
    ctx.lineTo(0, 12);
    ctx.lineTo(-8, 4);
    ctx.lineTo(-12, 0);
    ctx.lineTo(-8, -4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.restore();
  }

  // Draw explosions
  for(var i=0; i<g.explosions.length; i++) {
    var ex = g.explosions[i];
    var a = ex.life / 20;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, (20-ex.life)*2*S, 0, 6.28);
    ctx.fill();
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, (20-ex.life)*S, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold '+(18*S)+'px Orbitron';
  ctx.fillText('SCORE: '+score, 20*S, H-80*S);

  // Health bar
  ctx.fillText('HEALTH:', 20*S, H-55*S);
  for(var i=0; i<g.maxHealth; i++) {
    ctx.fillStyle = i < g.health ? '#00ff00' : '#333';
    ctx.fillRect(120*S + i*25*S, H-65*S, 20*S, 15*S);
  }

  // Weapon indicator
  if(g.weapon !== 'normal' && g.weaponTimer > 0) {
    ctx.fillStyle = NY;
    var weaponName = g.weapon.toUpperCase();
    ctx.fillText('WEAPON: '+weaponName, 20*S, H-30*S);
  }

  ctx.textAlign = 'right';
  var secs = Math.ceil(g.timer/60);
  ctx.fillStyle = secs<=5 ? NP : NC;
  ctx.font = 'bold '+(20*S)+'px Orbitron';
  ctx.fillText('TIME: '+secs, W-20*S, H-60*S);
}

// ═══ GAME LOOP ═══
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// Auto-start if URL has ?autostart
if(window.location.search.indexOf('autostart')!==-1) {
  state='playing';
  initGame();
}

gameLoop();
</script>
</body>
</html>
