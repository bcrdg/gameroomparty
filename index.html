    });
  },

  fadeOut(audioEl, duration) {
    if (!audioEl || audioEl.paused) return;
    const startVol = audioEl.volume;
    const steps = 20;
    const stepTime = duration / steps;
    let step = 0;
    const fade = setInterval(() => {
      step++;
      audioEl.volume = Math.max(0, startVol * (1 - step / steps));
      if (step >= steps) {
        clearInterval(fade);
        audioEl.pause();
        audioEl.currentTime = 0;
        audioEl.volume = startVol;
      }
    }, stepTime);
  },

    this.stopAll();

function getCurrentWeekKey() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  return weekStart.toISOString().slice(0, 10);
}

function isScoreFromThisWeek(timestamp) {
  const scoreDate = new Date(timestamp);
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  weekStart.setHours(0, 0, 0, 0);
  return scoreDate >= weekStart;
}

function cleanWeeklyScores(scores) {
  // Remove scores not from this week
  if (scores.weeklyScores) {
    scores.weeklyScores = scores.weeklyScores.filter(s => isScoreFromThisWeek(s.date));
  }
  if (scores.weeklyHeights) {
    scores.weeklyHeights = scores.weeklyHeights.filter(s => isScoreFromThisWeek(s.date));
  }
  return scores;
}

async function fetchJSONBinScores() {
  try {
    console.log('Fetching JSONBin scores...');
    const response = await fetch(JSONBIN_URL + '/latest', {
      headers: {
        'X-Master-Key': JSONBIN_KEY

    });

    console.log('JSONBin response status:', response.status);

    if (response.ok) {
      const data = await response.json();
      console.log('JSONBin data received:', data);
      let scores = data.record;

      // If bin is empty or malformed, initialize it
      if (!scores || (!scores.online && !scores.arcade)) {
        console.log('Initializing empty JSONBin structure...');
        await initializeJSONBin();
        return;
      }

      // Load online scores and clean weekly
      if (scores.online) {
        scores.online = cleanWeeklyScores(scores.online);
        onlineScores.allTimeScores = scores.online.allTimeScores || [];
        onlineScores.allTimeHeights = scores.online.allTimeHeights || [];
        onlineScores.weeklyScores = scores.online.weeklyScores || [];
        onlineScores.weeklyHeights = scores.online.weeklyHeights || [];
      }

      // Load arcade scores and clean weekly
      if (scores.arcade) {
        scores.arcade = cleanWeeklyScores(scores.arcade);
        arcadeScores.allTimeScores = scores.arcade.allTimeScores || [];
        arcadeScores.allTimeHeights = scores.arcade.allTimeHeights || [];
        arcadeScores.weeklyScores = scores.arcade.weeklyScores || [];
        arcadeScores.weeklyHeights = scores.arcade.weeklyHeights || [];
      }

      // Update JSONBin with cleaned scores
      const needsUpdate = (scores.online && (
        scores.online.weeklyScores.length !== onlineScores.weeklyScores.length ||
        scores.online.weeklyHeights.length !== onlineScores.weeklyHeights.length
      )) || (scores.arcade && (
        scores.arcade.weeklyScores.length !== arcadeScores.weeklyScores.length ||
        scores.arcade.weeklyHeights.length !== arcadeScores.weeklyHeights.length
      ));

      if (needsUpdate) {
        console.log('Cleaning up old weekly scores...');
        await updateJSONBinScores();
      }

      jsonbinLoaded = true;
      console.log('JSONBin scores loaded successfully!');
      console.log('Online scores:', onlineScores.allTimeScores.length);
      console.log('Arcade scores:', arcadeScores.allTimeScores.length);
    } else {
      console.error('JSONBin fetch failed with status:', response.status);
      const errorText = await response.text();
      console.error('Error response:', errorText);
    }
  } catch (error) {
    console.error('Failed to load JSONBin scores:', error);
    jsonbinLoaded = false;
  }
}

async function initializeJSONBin() {
  const emptyStructure = {
    online: {
      allTimeScores: [],
      allTimeHeights: [],
      weeklyScores: [],
      weeklyHeights: []
    },
    arcade: {
      allTimeScores: [],
      allTimeHeights: [],
      weeklyScores: [],
      weeklyHeights: []
    }
  };

  try {
    const response = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify(emptyStructure)
    });

    if (response.ok) {
      console.log('JSONBin initialized with empty structure');
      onlineScores = emptyStructure.online;
      arcadeScores = emptyStructure.arcade;
      jsonbinLoaded = true;
    }
  } catch (error) {
    console.error('Failed to initialize JSONBin:', error);
  }
}

async function updateJSONBinScores() {
  try {
    const payload = {
      online: {
        allTimeScores: onlineScores.allTimeScores,
        allTimeHeights: onlineScores.allTimeHeights,
        weeklyScores: onlineScores.weeklyScores,
        weeklyHeights: onlineScores.weeklyHeights
      },
      arcade: {
        allTimeScores: arcadeScores.allTimeScores,
        allTimeHeights: arcadeScores.allTimeHeights,
        weeklyScores: arcadeScores.weeklyScores,
        weeklyHeights: arcadeScores.weeklyHeights
      }
    };

    const response = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      console.log('JSONBin scores updated successfully');
      return true;
    }
  } catch (error) {
    console.warn('Failed to update JSONBin scores:', error);
  }
  return false;
}

function loadHighScores() {
  // Load local localStorage scores for current mode
  try {
    const at = localStorage.getItem('grp-hs-alltime');
    allTimeScores = at ? JSON.parse(at) : [];
  } catch(e) { allTimeScores = []; }
  try {
    const wk = localStorage.getItem('grp-hs-weekly');
    if (wk) {
      const data = JSON.parse(wk);
      const now = new Date();
      const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
      const weekKey = weekStart.toISOString().slice(0,10);
      if (data.week === weekKey) {
        weeklyScores = data.scores;
      } else {
        weeklyScores = [];
      }
    } else { weeklyScores = []; }
  } catch(e) { weeklyScores = []; }
  // Load height leaderboards
  try {
    const ath = localStorage.getItem('grp-hs-alltime-height');
    allTimeHeights = ath ? JSON.parse(ath) : [];
  } catch(e) { allTimeHeights = []; }
  try {
    const wkh = localStorage.getItem('grp-hs-weekly-height');
    if (wkh) {
      const data = JSON.parse(wkh);
      const now = new Date();
      const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
      const weekKey = weekStart.toISOString().slice(0,10);
      if (data.week === weekKey) {
        weeklyHeights = data.scores;
      } else {

}

function saveHighScores() {
  try {
    localStorage.setItem('grp-hs-alltime', JSON.stringify(allTimeScores.slice(0,20)));
    localStorage.setItem('grp-hs-alltime-height', JSON.stringify(allTimeHeights.slice(0,20)));
    const now = new Date();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    const weekKey = weekStart.toISOString().slice(0,10);
    localStorage.setItem('grp-hs-weekly', JSON.stringify({week:weekKey, scores:weeklyScores.slice(0,20)}));
    localStorage.setItem('grp-hs-weekly-height', JSON.stringify({week:weekKey, scores:weeklyHeights.slice(0,20)}));

function qualifiesForHighScore(s) {
  if (s <= 0) return false;
  if (allTimeScores.length < 20) return true;
  return s > allTimeScores[allTimeScores.length - 1].score;
}

function qualifiesForHighHeight(h) {
  if (h <= 0) return false;
  if (allTimeHeights.length < 20) return true;
  return h > allTimeHeights[allTimeHeights.length - 1].height;
}

function isNameBlocked(name) {
  if (!BLOCKED_WORDS || BLOCKED_WORDS.length === 0) return false;
  const lower = name.toLowerCase().replace(/\s+/g, ' ');
  for (let i = 0; i < BLOCKED_WORDS.length; i++) {
    if (lower.indexOf(BLOCKED_WORDS[i].toLowerCase()) !== -1) return true;
  }
  return false;
}

function insertHighScore(name, s, h) {
  const cleaned = (name.trim() || 'AAA');
  if (isNameBlocked(cleaned)) return false; // blocked

  const now = Date.now();
  const targetScores = gameMode === 'online' ? onlineScores : arcadeScores;

  // Insert points score if qualified
  if (qualifiesForHighScore(s)) {
    const entry = { name: cleaned, score: s, date: now };
    allTimeScores.push(entry);
    allTimeScores.sort((a,b) => b.score - a.score);
    allTimeScores = allTimeScores.slice(0, 20);
    weeklyScores.push(entry);
    weeklyScores.sort((a,b) => b.score - a.score);
    weeklyScores = weeklyScores.slice(0, 20);

    // Also update JSONBin data
    targetScores.allTimeScores.push(entry);
    targetScores.allTimeScores.sort((a,b) => b.score - a.score);
    targetScores.allTimeScores = targetScores.allTimeScores.slice(0, 20);
    targetScores.weeklyScores.push(entry);
    targetScores.weeklyScores.sort((a,b) => b.score - a.score);
    targetScores.weeklyScores = targetScores.weeklyScores.slice(0, 20);
  }

  // Insert height score if qualified
  if (qualifiesForHighHeight(h)) {
    const entry = { name: cleaned, height: h, date: now };
    allTimeHeights.push(entry);
    allTimeHeights.sort((a,b) => b.height - a.height);
    allTimeHeights = allTimeHeights.slice(0, 20);
    weeklyHeights.push(entry);
    weeklyHeights.sort((a,b) => b.height - a.height);
    weeklyHeights = weeklyHeights.slice(0, 20);

    // Also update JSONBin data
    targetScores.allTimeHeights.push(entry);
    targetScores.allTimeHeights.sort((a,b) => b.height - a.height);
    targetScores.allTimeHeights = targetScores.allTimeHeights.slice(0, 20);
    targetScores.weeklyHeights.push(entry);
    targetScores.weeklyHeights.sort((a,b) => b.height - a.height);
    targetScores.weeklyHeights = targetScores.weeklyHeights.slice(0, 20);
  }

  saveHighScores();
  // Update JSONBin asynchronously
  updateJSONBinScores();
  return true; // saved
}

function startNameEntry() {
  if (gameOverTimer) clearTimeout(gameOverTimer);
  gameOverTimer = 0;
  document.getElementById('gameOverScreen').style.display = 'none';

  // Determine what type of high score they achieved
  const qualPoints = qualifiesForHighScore(score);
  const qualHeight = qualifiesForHighHeight(heightScore);
  let hsType = 'points';
  if (qualPoints && qualHeight) hsType = 'both';
  else if (qualHeight) hsType = 'height';

  nameEntry = { name: '', cursor: { row: 0, col: 0 }, done: false, blink: 0, type: hsType };

  // Online mode: show input field for mobile keyboard
  if (gameMode === 'online') {
    const input = document.getElementById('nameInput');
    const submitBtn = document.getElementById('submitName');
    if (input && submitBtn) {
      // Remove old listeners to avoid duplicates
      input.replaceWith(input.cloneNode(true));
      submitBtn.replaceWith(submitBtn.cloneNode(true));

      const newInput = document.getElementById('nameInput');
      const newSubmitBtn = document.getElementById('submitName');

      newInput.style.display = 'block';
      newInput.value = '';
      newInput.readOnly = false;
      newInput.disabled = false;
      newSubmitBtn.style.display = 'block';

      const submitName = function() {
        if (nameEntry.name.length === 0) return;
        if (insertHighScore(nameEntry.name, score, heightScore)) {
          nameEntry.done = true;
          nameEntry.saveMsg = 'SAVED!';
          newInput.style.display = 'none';
          newSubmitBtn.style.display = 'none';
          newInput.blur();
          setTimeout(returnToIntro, 2000);
        } else {
          nameEntry.name = '';
          newInput.value = '';
          nameEntry.saveMsg = '';
          nameEntry.rejected = true;
          setTimeout(function(){ nameEntry.rejected = false; }, 2500);
        }
      };

      newInput.addEventListener('input', function(e) {
        nameEntry.name = e.target.value.toUpperCase().slice(0, 15);
        e.target.value = nameEntry.name;
      });

      newInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitName();
        }
      });

      newSubmitBtn.addEventListener('click', submitName);
      newSubmitBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        submitName();
      });
    }
  }
}

function getKBChar(row, col) {
  if (row < 3) {
    const idx = row * HS_COLS + col;
    return idx < 27 ? HS_KEYBOARD[idx] : null;
  }
  // Bottom row: DEL and END
  if (col < 4) return 'DEL';
  return 'END';
}

function initStars() {

    stars.push({ x: Math.random()*W, y: Math.random()*H*4, size: 0.5+Math.random()*1.5,

// Cached static background
let bgCache = null;
let bgCacheW = 0, bgCacheH = 0;

function buildBgCache() {
  bgCacheW = W; bgCacheH = H;
  bgCache = document.createElement('canvas');
  bgCache.width = W; bgCache.height = H;
  const bx = bgCache.getContext('2d');
  const grad = bx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#050212'); grad.addColorStop(0.5,'#0a0618'); grad.addColorStop(1,'#1a0a3e');
  bx.fillStyle = grad; bx.fillRect(0,0,W,H);
  const hY = H*0.85;
  const hG = bx.createRadialGradient(W/2,hY,0,W/2,hY,W*0.7);
  hG.addColorStop(0,'rgba(255,45,149,0.15)'); hG.addColorStop(0.5,'rgba(181,55,242,0.06)'); hG.addColorStop(1,'transparent');
  bx.fillStyle = hG; bx.fillRect(0,0,W,H);
  // Converging lines (static)
  bx.strokeStyle = 'rgba(255,45,149,0.06)'; bx.lineWidth = 0.5;
  for (let i = -8; i <= 8; i++) {
    bx.beginPath(); bx.moveTo(W/2+i*3,hY); bx.lineTo(W/2+i*50,H+20); bx.stroke();
  }
  // Sun - fills bottom 1/3
  const sunR = H * 0.25;
  const sY = H;
  const sG = bx.createLinearGradient(0, sY - sunR, 0, sY);
  sG.addColorStop(0,'#fcee09'); sG.addColorStop(0.4,'#ff6ec7'); sG.addColorStop(1,'#ff2d95');
  bx.fillStyle = sG; bx.beginPath(); bx.arc(W/2, sY, sunR, Math.PI, 0); bx.fill();
  // Horizontal stripe lines across sun
  bx.fillStyle = '#0a0618';
  const numStripes = 8;
  for (let i = 0; i < numStripes; i++) {
    const t = i / numStripes;
    const sy2 = sY - sunR + t * sunR;
    const stripeH = 2 + t * sunR * 0.04;
    if (sy2 > sY) continue;
    // Width of stripe at this height (chord of circle)
    const dy = sY - sy2;
    const halfW = Math.sqrt(Math.max(0, sunR * sunR - dy * dy));
    bx.fillRect(W/2 - halfW, sy2, halfW * 2, stripeH);
  }
}

function drawBackground() {
  // Rebuild cache if screen resized
  if (!bgCache || bgCacheW !== W || bgCacheH !== H) buildBgCache();
  ctx.drawImage(bgCache, 0, 0);

  // Stars (animated - kept live but reduced count)
  if (stars) {
    ctx.fillStyle = '#fff';
    for (let s of stars) {
      const sy = ((s.y+camera*s.speed*0.02)%(H*1.2));
      ctx.globalAlpha = 0.4+Math.sin(frameCount*0.03+s.twinkle)*0.5;
      ctx.beginPath(); ctx.arc(s.x,sy,s.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Horizontal grid lines (move with camera - kept live)
  const hY = H*0.85;
  const gridSp = 28, camOff = ((camera*0.15)%gridSp+gridSp)%gridSp;
  for (let i = 0; i < 20; i++) {
    const t = i/20, yy = hY+t*t*(H-hY)*1.5+camOff*t;
    if (yy > H) continue;
    ctx.strokeStyle = `rgba(255,45,149,${0.06+t*0.12})`;
    ctx.lineWidth = 0.5+t;
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
  }
}

function drawPlatform(p, screenY) {
  ctx.save();
  const x = p.x, y = screenY;
  if (p.type==='breaking' && p.broken) {
    ctx.globalAlpha = Math.max(0,1-p.breakTimer/30);
    for (let i=0;i<3;i++) {
      ctx.fillStyle = C.neonOrange; ctx.shadowBlur=0;
      ctx.fillRect(x-PLATFORM_W/2+i*20*S+(i-1)*22*S+p.breakTimer*(i-1)*0.6*S,y+p.breakTimer*p.breakTimer*0.12*S,18*S,PLATFORM_H-2*S);
    }
    ctx.restore(); return;
  }
  let color;
  switch(p.type) { case 'normal':color=C.neonCyan;break;case 'moving':color=C.neonPurple;break;case 'breaking':color=C.neonOrange;break;default:color=C.neonCyan; }
  ctx.shadowBlur=0; ctx.fillStyle = color;
  const pw=PLATFORM_W, ph=PLATFORM_H;
  ctx.beginPath();
  ctx.moveTo(x-pw/2+3*S,y); ctx.lineTo(x+pw/2-3*S,y); ctx.lineTo(x+pw/2,y+ph/2);
  ctx.lineTo(x+pw/2-3*S,y+ph); ctx.lineTo(x-pw/2+3*S,y+ph); ctx.lineTo(x-pw/2,y+ph/2);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(x-pw/2+8*S,y+2*S,pw-16*S,3*S);
  if (p.type==='breaking') {
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=S; ctx.beginPath();
    ctx.moveTo(x-8*S,y+S); ctx.lineTo(x-3*S,y+ph-S); ctx.moveTo(x+10*S,y+2*S); ctx.lineTo(x+5*S,y+ph); ctx.stroke();
  }
  if (p.hasSpring) {
    ctx.shadowBlur=0; ctx.strokeStyle=C.neonYellow; ctx.lineWidth=2.5*S;
    const sx2=x,sy2=y-2*S; ctx.beginPath();
    for (let i=0;i<=8;i++) { const t2=i/8; if(i===0) ctx.moveTo(sx2,sy2); else ctx.lineTo(sx2+(i%2===0?-5*S:5*S),sy2-t2*14*S); }
    ctx.stroke();
    ctx.fillStyle=C.neonYellow; ctx.beginPath(); ctx.arc(sx2,sy2-15*S,4*S,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawEnemy(e, screenY) {

    ctx.beginPath(); ctx.arc(6,-4,2,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle=e.color; ctx.beginPath(); ctx.ellipse(0,0,e.size+6,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.ellipse(0,-5,e.size-2,e.size-4,0,Math.PI,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    [C.neonPink,C.neonCyan,C.neonYellow].forEach((c,i)=>{ ctx.fillStyle=c; ctx.beginPath(); ctx.arc((i-1)*8,2,2,0,Math.PI*2); ctx.fill(); });
  }
  ctx.restore();
}

function drawPowerupItem(p, screenY) {
  ctx.save(); ctx.translate(p.x,screenY); ctx.scale(S,S); ctx.translate(0,Math.sin(Date.now()*0.004+p.x)*3);
  if (p.type==='jetpack') {
    ctx.shadowBlur=0; ctx.fillStyle='#666'; ctx.fillRect(-6,-10,12,20);
    ctx.strokeStyle=C.neonOrange; ctx.lineWidth=1; ctx.strokeRect(-6,-10,12,20);
    ctx.fillStyle=C.neonOrange; ctx.beginPath(); ctx.moveTo(-4,10); ctx.lineTo(0,18); ctx.lineTo(4,10); ctx.fill();
  } else {
    ctx.shadowBlur=0; ctx.fillStyle=C.neonPink;
    ctx.beginPath(); ctx.arc(0,-4,5,0,Math.PI*2); ctx.fill(); ctx.fillRect(-2,-4,4,10);
    ctx.strokeStyle=C.neonPink; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-14,-6); ctx.lineTo(14,-6); ctx.stroke();
  }
  ctx.restore();
}

function spawnParticles(x,y,color,count) {
  for (let i=0;i<count;i++)
    particles.push({x,y,vx:(Math.random()-0.5)*6*S,vy:(Math.random()-0.5)*6*S-2*S,
      life:20+Math.random()*15,maxLife:35,color,size:(2+Math.random()*3)*S});
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function initGame() {
  player={x:W/2,y:H-100,vx:0,vy:0,facingRight:true};
  camera=0; score=0; heightScore=0; gameOver=false; frameCount=0;
  platforms=[]; bullets=[]; enemies=[]; powerups=[]; particles=[]; coins=[];
  activePowerup=null; coinCount=0; lastCoinFrame=0; lastShootFrame=0;
  lives=3; scorePopups=[]; deathFreeze=0;
  mode='main';
  dropEvent=null; lastDropFrame=0; dropItems=[];
  wrapTipTimer = 600; // 10 seconds for wrap-around tip
  lastBestCamera = 0; // Reset stuck detection
  stuckCheckFrame = 0;
  initStars();
  platforms.push({x:W/2,y:H-50,type:'normal',hasSpring:false,broken:false,breakTimer:0,
    moveDir:0,moveSpeed:0,moveRange:0,moveOrigin:0});
  for (let i=1;i<20;i++) generatePlatform(H-50-i*(H/12));
}

function generatePlatform(y) {
  const diff=Math.min(score/8000,1);
  const type=pickType(diff);
  const hasSpring=type!=='breaking'&&Math.random()<0.06+diff*0.03;
  const p={x:30*S+Math.random()*(W-60*S),y,type,hasSpring,broken:false,breakTimer:0,
    moveDir:1,moveSpeed:type==='moving'?(1+Math.random()*1.5)*S:0,
    moveRange:type==='moving'?(40+Math.random()*50)*S:0,moveOrigin:0};
  p.moveOrigin=p.x; platforms.push(p);
  if (Math.random()<0.04+diff*0.06&&score>500) spawnEnemy(y-40*S-Math.random()*80*S);
  if (Math.random()<0.02+diff*0.01&&!p.hasSpring&&p.type==='normal')
    powerups.push({x:p.x,y:p.y-20*S,type:Math.random()<0.5?'jetpack':'copter',collected:false});
}

function pickType(d) {
  const r=Math.random(),bk=Math.min(0.05+d*0.15,0.18),mv=Math.min(0.1+d*0.15,0.25);
  if(r<bk) return 'breaking'; if(r<bk+mv) return 'moving'; return 'normal';
}

function spawnEnemy(y) {
  const cols=[C.neonPink,C.hotPink,C.neonOrange,C.neonPurple];
  const ci=Math.floor(Math.random()*cols.length);
  enemies.push({x:30*S+Math.random()*(W-60*S),y,
    vx:(Math.random()<0.5?1:-1)*(1+Math.random())*S,
    shape:['circle','ufo'][Math.floor(Math.random()*2)],
    size:14+Math.random()*6,color:cols[ci],glowColor:cols[ci],alive:true,points:100});
}

// INPUT
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.key]=true;

  // ── NAME ENTRY MODE ──
  if (nameEntry && !nameEntry.done) {
    // Online mode: use keyboard input directly
    if (gameMode === 'online') {
      if (e.key === 'Enter') {
        if (insertHighScore(nameEntry.name, score, heightScore)) {
          nameEntry.done = true;
          nameEntry.saveMsg = 'SAVED!';
          setTimeout(returnToIntro, 2000);
        } else {
          nameEntry.name = '';
          nameEntry.saveMsg = '';
          nameEntry.rejected = true;
          setTimeout(function(){ nameEntry.rejected = false; }, 2500);
        }
      } else if (e.key === 'Backspace') {
        nameEntry.name = nameEntry.name.slice(0, -1);
      } else if (e.key.length === 1 && nameEntry.name.length < 15) {
        // Only add printable characters
        if (e.key.match(/[a-zA-Z0-9 ]/)) {
          nameEntry.name += e.key.toUpperCase();
        }
      }
      e.preventDefault();
      return;
    }

    // Arcade mode: use on-screen keyboard
    const c = nameEntry.cursor;
    const maxCol = c.row < 3 ? HS_COLS - 1 : 8;

    if (e.key === 'ArrowLeft') {
      if (c.row === 3) {
        // On bottom row: jump between DEL and DONE
        c.col = c.col >= 4 ? 1 : (c.col === 0 ? 6 : 0);
      } else {
        c.col--; if (c.col < 0) c.col = maxCol;
      }
    }
    else if (e.key === 'ArrowRight') {
      if (c.row === 3) {
        // On bottom row: jump between DEL and DONE
        c.col = c.col < 4 ? 6 : (c.col === 8 ? 1 : 8);
      } else {
        c.col++; if (c.col > maxCol) c.col = 0;
      }
    }
    else if (e.key === 'ArrowUp') { c.row--; if (c.row < 0) c.row = 3; if (c.row < 3 && c.col >= HS_COLS) c.col = HS_COLS - 1; }
    else if (e.key === 'ArrowDown') { c.row++; if (c.row > 3) c.row = 0; if (c.row < 3 && c.col >= HS_COLS) c.col = HS_COLS - 1; }
    else if (e.key === 's' || e.key === 'S') {
      const ch = getKBChar(c.row, c.col);
      if (ch === 'END') {
        if (insertHighScore(nameEntry.name, score, heightScore)) {
          nameEntry.done = true;
          nameEntry.saveMsg = 'SAVED!';
          setTimeout(returnToIntro, 2000);
        } else {
          // Name was blocked
          nameEntry.name = '';
          nameEntry.saveMsg = '';
          nameEntry.rejected = true;
          setTimeout(function(){ nameEntry.rejected = false; }, 2500);
        }
      } else if (ch === 'DEL') {
        nameEntry.name = nameEntry.name.slice(0, -1);
      } else if (ch && nameEntry.name.length < 15) {
        nameEntry.name += ch;
      }
    }
    e.preventDefault();
    return;
  }

  if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();if(mode==='main')shoot();}
  // Arcade intro keys
  if((e.key==='c'||e.key==='C')){
    if(gameOver&&!nameEntry){ returnToIntro(); return; }
    insertCoin();
  }
  if((e.key==='s'||e.key==='S')&&!gameRunning&&coinInserted){
    startGame();
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!gameRunning&&!coinInserted){
    coinInserted=true;
    document.getElementById('coinPrompt').style.display='none';
    document.getElementById('startPrompt').style.display='block';
    return;
  }
  if(!gameRunning&&coinInserted&&!gameOver){ startGame(); return; }
  if(mode==='main') shoot();
});

// ── XIN-MO DUAL ARCADE (HID GAMEPAD) ──
// B0=Left, B1=Down, B2=Up, B3=Right, B4=Start. B7=Coin (active-low: held in normal state, releases on coin).
const PAD_MAP = {0:'ArrowLeft', 1:'ArrowDown', 2:'ArrowUp', 3:'ArrowRight', 4:'s'};
const PAD_COIN_BTN = 7;
const padPrev = {};
let padCoinPrev = false, padCoinArmed = false;
function pollGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const pad of pads) {
    if (!pad) continue;
    for (const i in PAD_MAP) {
      const key = PAD_MAP[i];
      const cur = !!(pad.buttons[i] && pad.buttons[i].pressed);
      if (cur && !padPrev[i]) document.dispatchEvent(new KeyboardEvent('keydown', {key}));
      else if (!cur && padPrev[i]) document.dispatchEvent(new KeyboardEvent('keyup', {key}));
      padPrev[i] = cur;
    }
    const coinCur = !!(pad.buttons[PAD_COIN_BTN] && pad.buttons[PAD_COIN_BTN].pressed);
    if (coinCur) padCoinArmed = true;
    if (padCoinArmed && padCoinPrev && !coinCur) document.dispatchEvent(new KeyboardEvent('keydown', {key:'c'}));
    padCoinPrev = coinCur;
    break;
  }
  requestAnimationFrame(pollGamepad);
}
requestAnimationFrame(pollGamepad);

function shoot() {
  if(!gameRunning||gameOver) return;
  bullets.push({x:player.x+(player.facingRight?18*S:-18*S),y:player.y-20*S,vy:-BULLET_SPEED});
}

// ═══════════════════════════════════════
// MAIN GAME UPDATE
// ═══════════════════════════════════════
function updateMain() {
  frameCount++;
  let mx=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) mx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) mx=1;
  if(touchDir!==0) mx=touchDir;
  // Online mode: also use tilt controls
  if(gameMode === 'online' && Math.abs(tiltX) > 0.1) {
    mx = tiltX;
  }
  player.vx=mx*PLAYER_SPEED;
  if(mx>0) player.facingRight=true;
  if(mx<0) player.facingRight=false;

  if(activePowerup){
    activePowerup.timer--;
    if(activePowerup.timer<=0) activePowerup=null;
    else player.vy=activePowerup.type==='jetpack'?JETPACK_VEL:COPTER_VEL;
  }
  if(!activePowerup) player.vy+=GRAVITY;
  player.x+=player.vx; player.y+=player.vy;
  if(player.x<-20*S) player.x=W+20*S;
  if(player.x>W+20*S) player.x=-20*S;

  // Platform collision
  if(player.vy>0&&!activePowerup){
    for(let p of platforms){
      if(p.broken) continue;
      const py=p.y-camera, spy=player.y-camera;
      if(player.x>p.x-PLATFORM_W/2-10*S&&player.x<p.x+PLATFORM_W/2+10*S&&
        spy+14*S>py&&spy+14*S<py+PLATFORM_H+player.vy+2*S){
        if(p.type==='breaking'){
          player.vy=JUMP_VEL;
          p.broken=true;p.breakTimer=0;
          spawnParticles(p.x,py,C.neonOrange,6);
          continue;
        }
        player.vy=p.hasSpring?SPRING_VEL:JUMP_VEL;
        spawnParticles(p.x,py,p.hasSpring?C.neonYellow:C.neonCyan,3);
      }
    }
  }

  const psy=player.y-camera;
  if(psy<H*0.35) camera=player.y-H*0.35;
  score=Math.max(score,Math.floor(-camera/4));
  heightScore=Math.max(heightScore,Math.floor(-camera/10)); // Height in units

  // Stuck detection: spawn help if player hasn't progressed in 5 seconds
  if(camera < lastBestCamera) {
    lastBestCamera = camera;
    stuckCheckFrame = frameCount;
  }
  if(frameCount - stuckCheckFrame > STUCK_THRESHOLD && frameCount > 120) {
    // Player is stuck - spawn a rescue platform or enemy close above them
    const rescueY = player.y - 40*S; // Spawn closer for easier reach
    if(Math.random() < 0.7) {
      // Spawn a platform slightly offset so it's visible
      const offsetX = player.x + (Math.random() - 0.5) * 60*S;
      platforms.push({x:Math.max(50*S, Math.min(W-50*S, offsetX)),y:rescueY,type:'normal',hasSpring:false,broken:false,breakTimer:0,
        moveDir:0,moveSpeed:0,moveRange:0,moveOrigin:0});
      spawnParticles(offsetX,rescueY-camera,C.neonCyan,8);
    } else {
      // Spawn an enemy to bounce off
      spawnEnemy(rescueY);
    }
    stuckCheckFrame = frameCount; // Reset to avoid spam
  }

  // Autofire bullets (except when powerup is active - those don't shoot)
  if (!activePowerup && frameCount - lastShootFrame >= 20) { // Fire every 20 frames (~0.33 seconds)
    bullets.push({x:player.x+(player.facingRight?18*S:-18*S),y:player.y-20*S,vy:-BULLET_SPEED});
    lastShootFrame = frameCount;
  }

  // Gen platforms
  const highest=platforms.reduce((m,p)=>Math.min(m,p.y),Infinity);
  const diff=Math.min(score/10000,1), tY=camera-100;
  if(highest>tY){
    const sp=Math.min((45+diff*35)*S,70*S); let yy=highest-sp;
    while(yy>tY){generatePlatform(yy);yy-=sp+Math.random()*15*S;}
  }

  platforms=platforms.filter(p=>{
    if(p.broken){p.breakTimer++;return p.breakTimer<40;}
    return p.y-camera<H+50;
  });
  for(let p of platforms){
    if(p.type==='moving'&&!p.broken){
      p.x+=p.moveSpeed*p.moveDir;
      if(p.x>p.moveOrigin+p.moveRange||p.x<p.moveOrigin-p.moveRange) p.moveDir*=-1;
      p.x=Math.max(PLATFORM_W/2,Math.min(W-PLATFORM_W/2,p.x));
    }
  }

  for(let b of bullets) b.y+=b.vy;
  bullets=bullets.filter(b=>b.y-camera>-50);

  for(let e of enemies){
    if(!e.alive) continue;
    e.x+=e.vx; if(e.x<e.size*S||e.x>W-e.size*S) e.vx*=-1;
    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i];
      if(Math.abs(b.x-e.x)<(e.size+5)*S&&Math.abs(b.y-e.y)<(e.size+5)*S){
        e.alive=false;bullets.splice(i,1);score+=e.points;
        spawnParticles(e.x,e.y-camera,e.glowColor,12);break;
      }
    }
    if(e.alive){
      const dx=player.x-e.x,dy=player.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<(e.size+14)*S){
        if(player.vy>0&&player.y<e.y){
          e.alive=false;player.vy=JUMP_VEL;score+=e.points;
          spawnParticles(e.x,e.y-camera,e.glowColor,12);
        }else if(!activePowerup){playerHit();return;}
      }
    }
  }
  enemies=enemies.filter(e=>e.alive&&e.y-camera<H+100);

  for(let p of powerups){
    if(p.collected) continue;
    if(Math.abs(player.x-p.x)<20*S&&Math.abs(player.y-p.y)<20*S){
      p.collected=true;
      activePowerup={type:p.type,timer:p.type==='jetpack'?120:150};
      spawnParticles(p.x,p.y-camera,p.type==='jetpack'?C.neonOrange:C.neonPink,8);
    }
  }
  powerups=powerups.filter(p=>!p.collected&&p.y-camera<H+50);

  // ── QUARTER SPAWNING (every 30 seconds) ──
  if (frameCount - lastCoinFrame >= COIN_INTERVAL && frameCount > 60) {
    // Find a visible normal platform to put it on
    let bestPlat = null;
    for (let p of platforms) {
      if (p.type === 'normal' && !p.broken && !p.hasSpring) {
        const sy = p.y - camera;
        if (sy > H * 0.1 && sy < H * 0.6) { bestPlat = p; break; }
      }
    }
    if (bestPlat) {
      coins.push({ x: bestPlat.x, y: bestPlat.y - 35*S, collected: false });
      lastCoinFrame = frameCount;
    }
  }

  // ── QUARTER COLLECTION ──
  for (let c of coins) {
    if (c.collected) continue;
    if (Math.abs(player.x - c.x) < 24*S && Math.abs(player.y - c.y) < 28*S) {
      c.collected = true;
      spawnParticles(c.x, c.y - camera, C.gold, 10);

      if (gameMode === 'arcade') {
        // Arcade: collect 3 coins to trigger bonus
        coinCount++;
        if (coinCount >= 3) {
          coinCount = 0;
          startBonusTransition();
          return;
        }
      } else {
        // Online: each coin is worth 50k points
        score += 50000;
        scorePopups.push({x: c.x, y: c.y - camera, text: '+50K', color: C.gold, life: 60});
      }
    }
  }
  coins = coins.filter(c => !c.collected && c.y - camera < H + 50);

  // ── DROP EVENT UPDATE ──
  if (!dropEvent && frameCount - lastDropFrame >= DROP_INTERVAL && frameCount > 300) {
    // Start a random character drop
    const charIdx = Math.floor(Math.random() * DROP_CHARS.length);
    dropEvent = {
      char: DROP_CHARS[charIdx],
      phase: 'intro', // intro -> dropping -> fadeout
      timer: 0,
      introLen: 120,   // 2 sec intro (portrait + speech)
      dropLen: 360,    // 6 sec of falling items
      fadeLen: 40,     // fade out
      portraitAngle: 0,
      portraitScale: 0,
      bubbleAlpha: 0,
    };
    dropItems = [];
    lastDropFrame = frameCount;
  }

  if (dropEvent) {
    dropEvent.timer++;
    const de = dropEvent;
    if (de.phase === 'intro') {
      // Portrait spins in and scales up
      de.portraitScale = Math.min(1, de.timer / 20);
      de.portraitAngle = de.timer * 0.15;
      if (de.timer > 30) de.portraitAngle = Math.sin((de.timer - 30) * 0.1) * 0.1; // settle
      de.bubbleAlpha = Math.min(1, (de.timer - 15) / 20);
      if (de.timer >= de.introLen) { de.phase = 'dropping'; de.timer = 0; }
    } else if (de.phase === 'dropping') {
      // Spawn falling items
      if (de.timer % 6 === 0) {
        const ix = 20*S + Math.random() * (W - 40*S);
        if (de.char.itemType === 'wings') {
          const isRed = Math.random() < 0.35;
          dropItems.push({ x: ix, y: -10*S + camera, vy: (1.5 + Math.random())*S, type: de.char.itemType, bad: isRed, collected: false, rot: Math.random() * 6.28 });
        } else {
          dropItems.push({ x: ix, y: -10*S + camera, vy: (1.5 + Math.random())*S, type: de.char.itemType, bad: false, collected: false, rot: Math.random() * 6.28 });
        }
      }
      de.bubbleAlpha = Math.max(0, 1 - de.timer / 60); // bubble fades
      if (de.timer >= de.dropLen) { de.phase = 'fadeout'; de.timer = 0; }
    } else if (de.phase === 'fadeout') {
      de.portraitScale = Math.max(0, 1 - de.timer / de.fadeLen);
      if (de.timer >= de.fadeLen) { dropEvent = null; }
    }
  }

  // Update falling drop items
  for (let di of dropItems) {
    if (di.collected) continue;
    di.y += di.vy;
    di.rot += 0.03;
    // Check collection by player
    const dsy = di.y - camera;
    if (Math.abs(player.x - di.x) < 20*S && Math.abs((player.y - camera) - dsy) < 20*S) {
      di.collected = true;
      if (di.bad) {
        score = Math.max(0, score - 500);
        spawnParticles(di.x, dsy, C.neonPink, 5);
        scorePopups.push({x:di.x, y:dsy, text:'-500', color:C.neonPink, life:45});
      } else {
        const pts = 1500; // All good items worth 1500
        score += pts;
        spawnParticles(di.x, dsy, di.type === 'quarters' ? C.gold : C.neonYellow, 5);
        scorePopups.push({x:di.x, y:dsy, text:'+'+pts, color:di.type==='quarters'?C.gold:C.neonYellow, life:45});
      }
    }
  }
  dropItems = dropItems.filter(di => !di.collected && di.y - camera < H + 30);

    // Particles
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15*S;p.life--;}
  particles=particles.filter(p=>p.life>0);

  if(player.y-camera>H+50) playerHit();
}

function playerHit(){
  lives--;
  if(lives<=0){triggerGameOver();return;}
  // Freeze the game and show death alert
  deathFreeze = 120; // 2 seconds
  deathPhrase = DEATH_PHRASES[Math.floor(Math.random() * DEATH_PHRASES.length)];
  activePowerup=null;
  spawnParticles(player.x,player.y-camera,'#f55',15);
}

function respawnPlayer(){
  player.vy=JUMP_VEL;
  let best=null, by2=Infinity;
  for(let p of platforms){
    if(p.broken) continue;
    const sy=p.y-camera;
    if(sy>H*0.3&&sy<H*0.8&&p.y<by2){by2=p.y;best=p;}
  }
  if(best){player.x=best.x;player.y=best.y-20*S;}
  else{player.y=camera+H*0.4;player.x=W/2;}
  spawnParticles(player.x,player.y-camera,C.neonCyan,10);
}

function triggerGameOver(){
  gameOver=true;gameRunning=false;
  if(score>highScore) highScore=score;
  if(heightScore>highHeight) highHeight=heightScore;
  document.getElementById('finalScore').innerHTML='Points: ' + score.toLocaleString() + '<br>Height: ' + heightScore.toLocaleString();
  const randomQuip = GAME_OVER_QUIPS[Math.floor(Math.random() * GAME_OVER_QUIPS.length)];
  document.getElementById('oneLiner').textContent = randomQuip;
  document.getElementById('gameOverScreen').style.display='flex';
  audio.playGameover();
  if (qualifiesForHighScore(score) || qualifiesForHighHeight(heightScore)) {
    gameOverTimer = setTimeout(startNameEntry, 4000); // Increased from 2000 to 4000ms
  } else {
    gameOverTimer = setTimeout(returnToIntro, 15000);
  }
}

function returnToIntro(){
  if(gameOverTimer) clearTimeout(gameOverTimer);
  gameOverTimer=0;
  nameEntry=null;
  gameOver=false; gameRunning=false; coinInserted=false;
  document.getElementById('gameOverScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  document.getElementById('coinPrompt').style.display='block';
  document.getElementById('startPrompt').style.display='none';
  // Hide name input and submit button if visible
  const input = document.getElementById('nameInput');
  const submitBtn = document.getElementById('submitName');
  if (input) {
    input.style.display = 'none';
    input.blur();
  }
  if (submitBtn) {
    submitBtn.style.display = 'none';
  }
  audio.stopAll();
}

// ═══════════════════════════════════════
// BONUS TRANSITION
// ═══════════════════════════════════════
function startBonusTransition() {
  mode = 'bonus';
  audio.playBonus();

  // Choose bonus level
  var bonusFile;

  if (gameMode === 'online') {
    // Online mode: always bridge (space shooter is arcade-only)
    bonusFile = 'bonus_stage.html';
  } else {
    // Arcade mode: random first time, then alternate between both
    if (nextBonusLevel === null) {
      // First bonus: random choice
      nextBonusLevel = Math.random() < 0.5 ? 'bridge' : 'space';
    }

    if (nextBonusLevel === 'bridge') {
      bonusFile = 'bonus_stage.html';
      nextBonusLevel = 'space'; // Next time play space
    } else {
      bonusFile = 'bonus_stage_space.html';
      nextBonusLevel = 'bridge'; // Next time play bridge
    }
  }

  // Launch bonus stage in fullscreen iframe
  var iframe = document.createElement('iframe');
  iframe.id = 'bonusFrame';
  iframe.src = bonusFile + '?autostart';
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:100;';
  iframe.onload = function() { iframe.contentWindow.focus(); iframe.focus(); };
  document.body.appendChild(iframe);
  iframe.focus();
  // Listen for completion
  window.addEventListener('message', onBonusComplete);
}

function onBonusComplete(e) {
  if (!e.data || e.data.type !== 'bonusComplete') return;
  window.removeEventListener('message', onBonusComplete);
  var bonusScore = e.data.score || 0;
  score += bonusScore;
  // Remove iframe
  var f = document.getElementById('bonusFrame');
  if (f) f.remove();
  // Resume main game
  mode = 'main';
  audio.resumeGameplay();
  player.vy = JUMP_VEL;
  // Reset input state to prevent stuck controls
  keys = {};
  touchDir = 0;
}


// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function renderMain() {
  drawBackground();
  if(!gameRunning&&!gameOver) return;

  for(let p of platforms){const sy=p.y-camera;if(sy>-20&&sy<H+20)drawPlatform(p,sy);}
  for(let p of powerups){if(!p.collected){const sy=p.y-camera;if(sy>-20&&sy<H+20)drawPowerupItem(p,sy);}}
  for(let e of enemies){if(e.alive){const sy=e.y-camera;if(sy>-30&&sy<H+30)drawEnemy(e,sy);}}

  // World coins
  for(let c of coins){
    if(c.collected) continue;
    const sy=c.y-camera;
    if(sy>-30&&sy<H+30) drawCoin(c.x,sy,16*S);
  }

  ctx.shadowBlur=0; ctx.fillStyle=C.neonCyan;
  for(let b of bullets){ctx.beginPath();ctx.arc(b.x,b.y-camera,3*S,0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;

  drawRobot(player.x,player.y-camera,player.facingRight);

  for(let p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.shadowBlur=0;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // ── DROP EVENT: FALLING ITEMS ──
  for (let di of dropItems) {
    if (di.collected) continue;
    const dsy = di.y - camera;
    if (dsy < -20 || dsy > H + 20) continue;
    ctx.save();
    ctx.translate(di.x, dsy);
    ctx.scale(S, S);
    ctx.rotate(di.rot);
    if (di.type === 'fries') {
      // French fry - golden rectangle
      ctx.fillStyle = '#f0c040';
      ctx.fillRect(-3, -10, 6, 20);
      ctx.fillStyle = '#d4a030';
      ctx.fillRect(-3, -10, 6, 4);
      ctx.strokeStyle = '#b08020'; ctx.lineWidth = 1;
      ctx.strokeRect(-3, -10, 6, 20);
    } else if (di.type === 'quarters') {
      // Small spinning quarter
      const ph = (Date.now() * 0.005 + di.x) % (Math.PI * 2);
      const sx2 = Math.cos(ph);
      ctx.scale(sx2, 1);
      ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      if (Math.abs(sx2) > 0.3) {
        ctx.fillStyle = '#b8860b'; ctx.font = 'bold 7px Orbitron,monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('25', 0, 0);
      }
    } else if (di.type === 'wings') {
      // Chicken wing shape
      ctx.fillStyle = di.bad ? '#cc2222' : '#c8873a';
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = di.bad ? '#991111' : '#a06828'; ctx.lineWidth = 1;
      ctx.stroke();
      // Bone nub
      ctx.fillStyle = '#f0e8d0';
      ctx.beginPath(); ctx.arc(8, 0, 3, 0, Math.PI * 2); ctx.fill();
      if (di.bad) {
        // Heat lines
        ctx.strokeStyle = 'rgba(255,100,0,0.6)'; ctx.lineWidth = 1;
        const wv = Math.sin(Date.now() * 0.01 + di.x) * 2;
        ctx.beginPath(); ctx.moveTo(-4, -8); ctx.quadraticCurveTo(-2+wv, -12, -4, -16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(2, -8); ctx.quadraticCurveTo(4+wv, -12, 2, -16); ctx.stroke();
      }
    }
    ctx.restore();
  }

  // ── DROP EVENT: PORTRAIT + SPEECH BUBBLE ──
  if (dropEvent && dropEvent.portraitScale > 0.01) {
    const de = dropEvent;
    const sz = 380 * S * de.portraitScale;
    const px = W / 2, py = H * 0.82;

    // Speech bubble ABOVE portrait
    if (de.bubbleAlpha > 0.01) {
      ctx.save();
      ctx.globalAlpha = de.bubbleAlpha;
      const lines = de.char.text.split('\n');
      const bw = 280*S, bh = (24 + lines.length * 20)*S;
      const bx = W / 2 - bw / 2, by = py - sz / 2 - bh - 18*S;
      // Bubble bg
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2*S;
      ctx.beginPath();
      ctx.moveTo(bx + 10*S, by);
      ctx.lineTo(bx + bw - 10*S, by);
      ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + 10*S);
      ctx.lineTo(bx + bw, by + bh - 10*S);
      ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - 10*S, by + bh);
      ctx.lineTo(bx + 10*S, by + bh);
      ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - 10*S);
      ctx.lineTo(bx, by + 10*S);
      ctx.quadraticCurveTo(bx, by, bx + 10*S, by);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Tail pointing down to portrait
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(W / 2 - 10*S, by + bh);
      ctx.lineTo(W / 2, by + bh + 14*S);
      ctx.lineTo(W / 2 + 10*S, by + bh);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2*S;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 10*S, by + bh + S);
      ctx.lineTo(W / 2, by + bh + 14*S);
      ctx.lineTo(W / 2 + 10*S, by + bh + S);
      ctx.stroke();
      // Text centered
      ctx.fillStyle = '#222';
      ctx.font = 'bold ' + Math.floor(13*S) + 'px Orbitron, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], W / 2, by + 10*S + i * 20*S);
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Portrait centered below bubble
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(de.portraitAngle);
    ctx.globalAlpha = de.portraitScale;
    ctx.drawImage(de.char.img, -sz/2, -sz/2, sz, sz);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

    // HUD - Score and Height
  ctx.font='bold '+Math.floor(16*S)+'px Orbitron,monospace'; ctx.textAlign='left';
  ctx.fillStyle='#889'; ctx.shadowBlur=0;
  ctx.fillText('SCORE',12*S,22*S);
  ctx.fillStyle=C.neonCyan;
  ctx.fillText(score.toLocaleString(),12*S,38*S);
  ctx.fillStyle='#889';
  ctx.fillText('HEIGHT',12*S,54*S);
  ctx.fillStyle=C.neonPurple;
  ctx.fillText(heightScore.toLocaleString(),12*S,70*S);
  ctx.shadowBlur=0;

  // HUD - Quarter count + coin icon (upper right, arcade only)
  if (gameMode === 'arcade') {
    const qx = W - 14*S;
    ctx.font='bold '+Math.floor(14*S)+'px Orbitron,monospace'; ctx.textAlign='right';
    ctx.fillStyle=C.gold;
    ctx.fillText(coinCount + '/3', qx - 22*S, 24*S);
    drawCoin(qx - 6*S, 19*S, 8*S);
  }

  // HUD - Lives (hearts below coins)
  for (let i = 0; i < lives; i++) {
    const hs=S, hx = W - 18*hs - i * 20*hs, hy = 36*hs;
    ctx.fillStyle = C.neonPink;
    ctx.beginPath();
    ctx.moveTo(hx, hy+3*hs);
    ctx.bezierCurveTo(hx,hy-3*hs, hx-7*hs,hy-3*hs, hx-7*hs,hy+1*hs);
    ctx.bezierCurveTo(hx-7*hs,hy+6*hs, hx,hy+9*hs, hx,hy+11*hs);
    ctx.bezierCurveTo(hx,hy+9*hs, hx+7*hs,hy+6*hs, hx+7*hs,hy+1*hs);
    ctx.bezierCurveTo(hx+7*hs,hy-3*hs, hx,hy-3*hs, hx,hy+3*hs);
    ctx.fill();
  }

  // Score popups
  for (let sp of scorePopups) {
    sp.y -= 1.2*S; sp.life--;
    ctx.globalAlpha = Math.min(1, sp.life / 15);
    ctx.font = 'bold '+Math.floor(14*S)+'px Orbitron,monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = sp.color;
    ctx.shadowBlur=0;
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  scorePopups = scorePopups.filter(sp => sp.life > 0);

  // Powerup bar
  if(activePowerup){
    const pct=activePowerup.timer/(activePowerup.type==='jetpack'?120:150);
    const bc=activePowerup.type==='jetpack'?C.neonOrange:C.neonPink;
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(12*S,78*S,52*S,6*S);
    ctx.fillStyle=bc; ctx.fillRect(12*S,78*S,52*S*pct,6*S);
  }

  // Persistent wrap-around tip with bouncing arrows
  if (wrapTipTimer > 0) {
    wrapTipTimer--;
    const wAlpha = wrapTipTimer > 90 ? 1 : wrapTipTimer / 90;
    const bounce = Math.sin(frameCount * 0.08) * 12 * S;
    const tipY = H * 0.55;
    ctx.globalAlpha = wAlpha;

    // Left bouncing arrow
    ctx.fillStyle = C.neonCyan;
    ctx.font = 'bold ' + Math.floor(28 * S) + 'px Orbitron,monospace';
    ctx.textAlign = 'center';
    ctx.fillText('\u2190', 24 * S + bounce, tipY);

    // Right bouncing arrow (opposite direction)
    ctx.fillText('\u2192', W - 24 * S - bounce, tipY);

    // Center text
    ctx.fillStyle = '#fff';
    ctx.font = Math.floor(14 * S) + 'px Orbitron,monospace';
    ctx.fillText('Move off screen to wrap around', W / 2, tipY);

    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════
// MASTER LOOP
// ═══════════════════════════════════════
function update() {
  if (!gameRunning || gameOver) return;
  if (mode === 'main') {
    if (deathFreeze > 0) {
      deathFreeze--;
      if (deathFreeze <= 0) respawnPlayer();
      return;
    }
    updateMain();
  }
  // When mode === 'bonus', iframe handles everything. Game is frozen.
}

function render() {
  // When bonus mode, iframe covers the screen. Just render frozen main game behind it.
  renderMain();

  // Death freeze overlay
  if (deathFreeze > 0 && gameRunning && !gameOver) {
    const freezeAlpha = deathFreeze > 90 ? Math.min(1, (120 - deathFreeze) / 15) : deathFreeze > 30 ? 1 : deathFreeze / 30;
    ctx.globalAlpha = freezeAlpha * 0.7;
    ctx.fillStyle = '#0a0618';
    ctx.fillRect(0, 0, W, H);

    ctx.globalAlpha = freezeAlpha;
    ctx.textAlign = 'center';

    // Flash effect on the text
    const flash = deathFreeze > 100 ? (deathFreeze % 6 < 3 ? 1 : 0.3) : 1;
    ctx.globalAlpha = freezeAlpha * flash;

    // Death phrase header - shrink font to fit canvas width
    ctx.fillStyle = C.neonPink;
    const maxPhraseWidth = W * 0.9;
    let phraseFontSize = Math.floor(38 * S);
    ctx.font = 'bold ' + phraseFontSize + 'px Orbitron,monospace';
    while (phraseFontSize > 10 && ctx.measureText(deathPhrase).width > maxPhraseWidth) {
      phraseFontSize -= 2;
      ctx.font = 'bold ' + phraseFontSize + 'px Orbitron,monospace';
    }
    ctx.fillText(deathPhrase, W / 2, H * 0.38);

    ctx.globalAlpha = freezeAlpha;

    // Remaining hearts - draw them big and centered
    const heartS = 14 * S;
    const heartSpacing = 36 * S;
    const heartsW = lives * heartSpacing;
    const heartStartX = W / 2 - heartsW / 2 + heartSpacing / 2;
    const heartY = H * 0.48;

    for (let i = 0; i < lives; i++) {
      const hx = heartStartX + i * heartSpacing;
      ctx.fillStyle = C.neonPink;
      ctx.beginPath();
      ctx.moveTo(hx, heartY + 3 * S);
      ctx.bezierCurveTo(hx, heartY - 5 * S, hx - heartS, heartY - 5 * S, hx - heartS, heartY + 2 * S);
      ctx.bezierCurveTo(hx - heartS, heartY + 10 * S, hx, heartY + 15 * S, hx, heartY + 18 * S);
      ctx.bezierCurveTo(hx, heartY + 15 * S, hx + heartS, heartY + 10 * S, hx + heartS, heartY + 2 * S);
      ctx.bezierCurveTo(hx + heartS, heartY - 5 * S, hx, heartY - 5 * S, hx, heartY + 3 * S);
      ctx.fill();
    }

    // "X lives remaining" text
    ctx.fillStyle = C.neonCyan;
    ctx.font = Math.floor(16 * S) + 'px Orbitron,monospace';
    ctx.fillText(lives + (lives === 1 ? ' LIFE' : ' LIVES') + ' REMAINING', W / 2, H * 0.57);

    ctx.globalAlpha = 1;
  }
}

function gameLoop() {
  // Scroll high scores on start screen
  if (!gameRunning && !gameOver && !nameEntry) hsScrollOffset += 0.8 * S;
  update();
  render();
  // Name entry overlay
  if (nameEntry) renderNameEntry();
  // Scrolling scores on start screen
  if (!gameRunning && !gameOver && !nameEntry && hsLoaded) renderScrollingScores();
  requestAnimationFrame(gameLoop);
}

function renderNameEntry() {
  const ne = nameEntry;
  ne.blink++;
  ctx.fillStyle = 'rgba(10,6,24,0.92)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = C.neonPink; ctx.font = 'bold '+Math.floor(32*S)+'px Orbitron,monospace';
  const titleText = ne.type === 'both' ? 'NEW HIGH SCORES!' : ne.type === 'height' ? 'NEW HIGH HEIGHT!' : 'NEW HIGH SCORE!';
  ctx.fillText(titleText, W/2, H*0.08);

  // Online mode: skip on-screen keyboard, just show keyboard input
  if (gameMode === 'online') {
    // Score
    ctx.fillStyle = C.gold; ctx.font = 'bold '+Math.floor(32*S)+'px Orbitron,monospace';
    if (ne.type === 'both') {
      ctx.fillText('Points: ' + score.toLocaleString(), W/2, H*0.18);
      ctx.fillText('Height: ' + heightScore.toLocaleString(), W/2, H*0.25);
    } else if (ne.type === 'height') {
      ctx.fillText('Height: ' + heightScore.toLocaleString(), W/2, H*0.18);
    } else {
      ctx.fillText('Points: ' + score.toLocaleString(), W/2, H*0.18);
    }

    // Show typed name in large letters
    if (ne.name.length > 0) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold '+Math.floor(48*S)+'px Orbitron,monospace';
      ctx.fillText(ne.name, W/2, H*0.35);

      ctx.fillStyle = '#aaa'; ctx.font = Math.floor(16*S)+'px Orbitron,monospace';
      ctx.fillText(ne.name.length + '/15 characters', W/2, H*0.40);
    } else {
      ctx.fillStyle = '#666'; ctx.font = Math.floor(20*S)+'px Orbitron,monospace';
      ctx.fillText('Enter your name...', W/2, H*0.35);
    }

    if (ne.done) {
      ctx.fillStyle = C.neonCyan; ctx.font = 'bold '+Math.floor(24*S)+'px Orbitron,monospace';
      ctx.fillText(ne.saveMsg || 'SAVED!', W/2, nameY + H*0.16);
    }

    if (ne.rejected) {
      ctx.fillStyle = C.neonPink; ctx.font = 'bold '+Math.floor(18*S)+'px Orbitron,monospace';
      ctx.fillText('KEEP IT CLEAN!', W/2, nameY + H*0.16);
      ctx.fillStyle = '#aaa'; ctx.font = Math.floor(12*S)+'px Orbitron,monospace';
      ctx.fillText('That name is not allowed. Try again.', W/2, nameY + H*0.20);
    }

    return; // Skip arcade keyboard rendering
  }

  // Arcade mode: continue with on-screen keyboard...

  // Score
  ctx.fillStyle = C.gold; ctx.font = 'bold '+Math.floor(32*S)+'px Orbitron,monospace';
  if (ne.type === 'both') {
    ctx.fillText('Points: ' + score.toLocaleString(), W/2, H*0.14);
    ctx.fillText('Height: ' + heightScore.toLocaleString(), W/2, H*0.19);
  } else if (ne.type === 'height') {
    ctx.fillText('Height: ' + heightScore.toLocaleString(), W/2, H*0.15);
  } else {
    ctx.fillText('Points: ' + score.toLocaleString(), W/2, H*0.15);
  }

  // Name so far
  const nameY = ne.type === 'both' ? H*0.26 : H*0.23;
  ctx.fillStyle = '#fff'; ctx.font = 'bold '+Math.floor(34*S)+'px Orbitron,monospace';
  let displayName = ne.name;
  if (!ne.done && ne.blink % 40 < 20) displayName += '_';
  else if (!ne.done) displayName += ' ';
  if (displayName.length === 0 && ne.blink % 40 < 20) displayName = '_';
  ctx.fillText(displayName, W/2, nameY);

  ctx.fillStyle = '#667'; ctx.font = Math.floor(12*S)+'px Orbitron,monospace';
  ctx.fillText('ENTER YOUR NAME (' + ne.name.length + '/15)', W/2, nameY + H*0.04);

  if (ne.done) {
    ctx.fillStyle = C.neonCyan; ctx.font = 'bold '+Math.floor(24*S)+'px Orbitron,monospace';
    ctx.fillText(ne.saveMsg || 'SAVED!', W/2, H*0.35);
    return;
  }

  // Rejection warning
  if (ne.rejected) {
    ctx.fillStyle = C.neonPink; ctx.font = 'bold '+Math.floor(18*S)+'px Orbitron,monospace';
    ctx.fillText('KEEP IT CLEAN!', W/2, H*0.32);
    ctx.fillStyle = '#aaa'; ctx.font = Math.floor(12*S)+'px Orbitron,monospace';
    ctx.fillText('That name is not allowed. Try again.', W/2, H*0.36);
  }

  // Keyboard grid - fills bottom half of screen
  const kbTop = H * 0.38;
  const kbBottom = H * 0.92;
  const kbHeight = kbBottom - kbTop;
  const totalRows = 4; // 3 letter rows + 1 action row
  const cellH = Math.floor(kbHeight / totalRows);
  const cellW = Math.floor((W - 20*S) / HS_COLS);
  const kbStartX = (W - cellW * HS_COLS) / 2;
  const gap = Math.floor(3*S);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const letterFont = 'bold '+Math.floor(22*S)+'px Orbitron,monospace';
  const actionFont = 'bold '+Math.floor(20*S)+'px Orbitron,monospace';

  // Letter rows (3 rows of 9)
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < HS_COLS; col++) {
      const idx = row * HS_COLS + col;
      if (idx >= 27) continue;
      const ch = HS_KEYBOARD[idx];
      const x = kbStartX + col * cellW + cellW/2;
      const y = kbTop + row * cellH + cellH/2;
      const selected = ne.cursor.row === row && ne.cursor.col === col;
      if (selected) {
        ctx.fillStyle = C.neonCyan;
        ctx.fillRect(kbStartX + col * cellW + gap, kbTop + row * cellH + gap, cellW - gap*2, cellH - gap*2);
        ctx.fillStyle = '#0a0618';
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(kbStartX + col * cellW + gap, kbTop + row * cellH + gap, cellW - gap*2, cellH - gap*2);
        ctx.fillStyle = '#ccc';
      }
      ctx.font = letterFont;
      ctx.fillText(ch === ' ' ? '␣' : ch, x, y);
    }
  }

  // Bottom row: DEL and END
  const bY = kbTop + 3 * cellH;
  const delSelected = ne.cursor.row === 3 && ne.cursor.col < 4;
  ctx.fillStyle = delSelected ? C.neonOrange : 'rgba(255,100,50,0.15)';
  ctx.fillRect(kbStartX + gap, bY + gap, cellW * 4 - gap*2, cellH - gap*2);
  ctx.fillStyle = delSelected ? '#0a0618' : C.neonOrange;
  ctx.font = actionFont;
  ctx.fillText('DEL', kbStartX + cellW * 2, bY + cellH/2);

  const endSelected = ne.cursor.row === 3 && ne.cursor.col >= 4;
  ctx.fillStyle = endSelected ? C.neonCyan : 'rgba(0,255,255,0.15)';
  ctx.fillRect(kbStartX + cellW * 4 + gap, bY + gap, cellW * 5 - gap*2, cellH - gap*2);
  ctx.fillStyle = endSelected ? '#0a0618' : C.neonCyan;
  ctx.font = actionFont;
  ctx.fillText('DONE', kbStartX + cellW * 4 + cellW * 2.5, bY + cellH/2);

  ctx.textBaseline = 'alphabetic';

  // Instructions
  ctx.fillStyle = '#445'; ctx.font = Math.floor(11*S)+'px Orbitron,monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ARROWS to move · S to select', W/2, H*0.96);
}

function renderScrollingScores() {
  const lines = [];

  // ARCADE section (show first)
  if (jsonbinLoaded) {
    lines.push({ type: 'maintitle', text: '═══════ ARCADE ═══════' });

    // All-Time subsection
    lines.push({ type: 'subtitle', text: '── ALL TIME ──' });
    if (arcadeScores.allTimeScores.length > 0) {
      lines.push({ type: 'minilabel', text: 'Points' });
      for (let i = 0; i < Math.min(3, arcadeScores.allTimeScores.length); i++) {
        const s = arcadeScores.allTimeScores[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.score });
      }
    }
    if (arcadeScores.allTimeHeights.length > 0) {
      lines.push({ type: 'minilabel', text: 'Height' });
      for (let i = 0; i < Math.min(3, arcadeScores.allTimeHeights.length); i++) {
        const s = arcadeScores.allTimeHeights[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.height });
      }
    }

    // Weekly subsection
    lines.push({ type: 'subtitle', text: '── THIS WEEK ──' });
    if (arcadeScores.weeklyScores.length > 0) {
      lines.push({ type: 'minilabel', text: 'Points' });
      for (let i = 0; i < Math.min(3, arcadeScores.weeklyScores.length); i++) {
        const s = arcadeScores.weeklyScores[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.score });
      }
    }
    if (arcadeScores.weeklyHeights.length > 0) {
      lines.push({ type: 'minilabel', text: 'Height' });
      for (let i = 0; i < Math.min(3, arcadeScores.weeklyHeights.length); i++) {
        const s = arcadeScores.weeklyHeights[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.height });
      }
    }

    lines.push({ type: 'spacer' });
  }

  // ONLINE section
  if (jsonbinLoaded) {
    lines.push({ type: 'maintitle', text: '═══════ ONLINE ═══════' });

    // All-Time subsection
    lines.push({ type: 'subtitle', text: '── ALL TIME ──' });
    if (onlineScores.allTimeScores.length > 0) {
      lines.push({ type: 'minilabel', text: 'Points' });
      for (let i = 0; i < Math.min(3, onlineScores.allTimeScores.length); i++) {
        const s = onlineScores.allTimeScores[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.score });
      }
    }
    if (onlineScores.allTimeHeights.length > 0) {
      lines.push({ type: 'minilabel', text: 'Height' });
      for (let i = 0; i < Math.min(3, onlineScores.allTimeHeights.length); i++) {
        const s = onlineScores.allTimeHeights[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.height });
      }
    }

    // Weekly subsection
    lines.push({ type: 'subtitle', text: '── THIS WEEK ──' });
    if (onlineScores.weeklyScores.length > 0) {
      lines.push({ type: 'minilabel', text: 'Points' });
      for (let i = 0; i < Math.min(3, onlineScores.weeklyScores.length); i++) {
        const s = onlineScores.weeklyScores[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.score });
      }
    }
    if (onlineScores.weeklyHeights.length > 0) {
      lines.push({ type: 'minilabel', text: 'Height' });
      for (let i = 0; i < Math.min(3, onlineScores.weeklyHeights.length); i++) {
        const s = onlineScores.weeklyHeights[i];
        lines.push({ type: 'score', rank: i+1, name: s.name, score: s.height });
      }
    }

    lines.push({ type: 'spacer' });
  }

  if (lines.length === 0) return;

  const lineH = Math.floor(36 * S);
  const fontSize = Math.floor(18 * S);
  const headerSize = Math.floor(20 * S);
  const totalH = lines.length * lineH;
  const startY = H * 0.38;
  const visibleH = H * 0.45;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, startY, W, visibleH);
  ctx.clip();

  const scrollY = startY - (hsScrollOffset % (totalH + visibleH)) + visibleH;

  ctx.textAlign = 'center';
  for (let i = 0; i < lines.length; i++) {
    const ly = scrollY + i * lineH;
    if (ly < startY - lineH || ly > startY + visibleH + lineH) continue;
    const line = lines[i];
    if (line.type === 'maintitle') {
      ctx.fillStyle = C.neonPink; ctx.font = 'bold '+Math.floor(24*S)+'px Orbitron,monospace';
      ctx.fillText(line.text, W/2, ly);
    } else if (line.type === 'subtitle') {
      ctx.fillStyle = C.neonCyan; ctx.font = 'bold '+Math.floor(16*S)+'px Orbitron,monospace';
      ctx.fillText(line.text, W/2, ly);
    } else if (line.type === 'minilabel') {
      ctx.fillStyle = C.neonYellow; ctx.font = Math.floor(14*S)+'px Orbitron,monospace';
      ctx.fillText(line.text, W/2, ly);
    } else if (line.type === 'header') {
      ctx.fillStyle = C.neonPink; ctx.font = 'bold '+headerSize+'px Orbitron,monospace';
      ctx.fillText(line.text, W/2, ly);
    } else if (line.type === 'score') {
      ctx.font = fontSize+'px Orbitron,monospace';
      const rank = String(line.rank).padStart(2, ' ') + '.';
      const name = line.name.padEnd(15, ' ');
      const sc = String(line.score).padStart(7, ' ');
      ctx.fillStyle = line.rank <= 3 ? C.gold : C.neonCyan;
      ctx.fillText(rank + ' ' + name + ' ' + sc, W/2, ly);
    }
  }
  ctx.restore();
}
